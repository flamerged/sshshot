name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Verify package version matches tag
        run: |
          tag="${GITHUB_REF##*/}"
          ver="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag $tag does not match package.json version $ver"
            exit 1
          fi

      # Trusted Publishing requires npm CLI >= 11.5.1 for the OIDC handshake.
      # Node 20's bundled npm is 10.8.2; without this upgrade the publish PUT
      # returns a misleading 'E404 Not Found' AFTER Sigstore successfully signs
      # the provenance statement. See npm/cli#9088 and community discussion
      # #173102 for context.
      - name: Upgrade npm CLI for OIDC support
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public
