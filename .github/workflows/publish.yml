name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Verify package version matches tag
        run: |
          tag="${GITHUB_REF##*/}"
          ver="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag $tag does not match package.json version $ver"
            exit 1
          fi

      - name: Publish to npm
        run: yarn npm publish
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
