name: pr-title-lint

# Validates that the PR title follows Conventional Commits format.
# Repo squash-merge setting is PR_TITLE → PR title becomes the commit
# message on master → semantic-release bumps version based on its prefix.
# Without this guard, a PR titled "update stuff" would land as a non-
# conventional commit and silently bypass the release pipeline.
#
# Allowed types match commitlint and semantic-release release rules:
#   feat / fix / perf  → trigger releases
#   chore / docs / refactor / test / ci / build / style / revert → no release

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [master]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            chore
            docs
            refactor
            test
            ci
            build
            style
            revert
          # Subject case: do not enforce, contributors can pick whatever
          # casing reads naturally in the title.
          subjectPattern: ^.+$
          # Require a description after the colon (i.e. block 'feat:' alone).
          requireScope: false
