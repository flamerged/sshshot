name: release

# Auto-publishes via semantic-release on every push to master.
# - `fix:` / `perf:` commits trigger a patch release.
# - `feat:` commits trigger a minor release.
# - Breaking changes are explicitly NOT auto-released — major versions are
#   intentionally tagged manually (`npm version major && git push --tags`),
#   which kicks the existing publish.yml.
#
# Architecture note: @semantic-release/npm requires an NPM_TOKEN even with
# `provenance: true` (provenance signs on top of token auth, doesn't replace
# it). To stay token-less and use Trusted Publishing via OIDC, we run sr with
# `npmPublish: false` (so it only does versioning + tag + GitHub release +
# changelog) and run `npm publish --provenance --access public` ourselves
# afterward, conditional on a new tag being created.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Capture current tag
        id: tag_before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release (versioning, tag, GH release; no npm publish)
        run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect whether a new release was cut
        id: tag_after
        run: |
          after=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
          before="${{ steps.tag_before.outputs.tag }}"
          if [ "$after" != "$before" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "tag=$after" >> "$GITHUB_OUTPUT"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm via OIDC
        if: steps.tag_after.outputs.new == 'true'
        run: npm publish --provenance --access public
