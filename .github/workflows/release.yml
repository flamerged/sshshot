name: release

# Auto-publishes via semantic-release on every push to master.
# - `fix:` / `perf:` commits trigger a patch release.
# - `feat:` commits trigger a minor release.
# - Breaking changes are explicitly NOT auto-released — major versions are
#   intentionally tagged manually (`npm version major && git push --tags`),
#   which kicks the existing publish.yml.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so semantic-release can read past commits/tags
          fetch-depth: 0
          # Keep the auth token wired up so semantic-release-github and the
          # git plugin can push the version-bump commit + create the GH
          # release. The release commit carries `[skip ci]` so CI doesn't
          # re-loop on it.

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Release
        run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
