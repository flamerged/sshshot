name: release

# Single workflow handling BOTH release paths so only one Trusted Publisher
# rule is needed on npm (the @flamerged/sshshot package's trust rule must
# point at this file: 'release.yml').
#
# - Push to master  -> semantic-release auto-flow:
#     * fix: / perf:  -> patch release (e.g. 0.3.0 -> 0.3.1)
#     * feat:         -> minor release (e.g. 0.3.0 -> 0.4.0)
#     * BREAKING      -> NOT auto-released (sr's release rule blocks it)
#   sr writes the version into package.json in CI (not committed back —
#   master is branch-protected), creates the GitHub Release + tag via API,
#   then a final step does `npm publish --provenance` via OIDC.
#
# - Push of a v* tag -> manual major flow:
#     User locally:
#       npm version major   # 0.x.y -> 1.0.0; commits + tags
#       git push --tags     # pushes the tag (the bump commit can fail
#                           #  branch protection — that's OK, the tag is
#                           #  what matters for publish; rebase later)
#   The tag push enters this workflow on the tag ref, the version-matches-
#   tag check passes, npm publish runs the same way.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      # ===== Master-push path: semantic-release auto-release =====

      - name: Capture package.json version before sr
        if: github.ref == 'refs/heads/master'
        id: ver_before
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Captured pre-sr version: $version"

      - name: Run semantic-release
        if: github.ref == 'refs/heads/master'
        run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # sr's @semantic-release/github plugin creates the tag via the GitHub
      # API, NOT a local git push, so 'git describe' on the runner doesn't
      # see the new tag. Comparing package.json version before/after is the
      # reliable detection: sr's @semantic-release/npm step always rewrites
      # the version field in the workspace, regardless of npmPublish setting.
      - name: Detect whether sr cut a release
        if: github.ref == 'refs/heads/master'
        id: sr_release_detect
        run: |
          after=$(node -p 'require("./package.json").version')
          before="${{ steps.ver_before.outputs.version }}"
          if [ "$after" != "$before" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "Released $before -> $after"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "No release this run (no qualifying commits since last tag)"
          fi

      - name: Publish to npm via OIDC (sr-driven)
        if: github.ref == 'refs/heads/master' && steps.sr_release_detect.outputs.new == 'true'
        run: npm publish --provenance --access public

      # ===== Tag-push path: manual major release =====

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF##*/}"
          ver="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag $tag does not match package.json version $ver"
            exit 1
          fi

      - name: Publish to npm via OIDC (manual tag-driven)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
